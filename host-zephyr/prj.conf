CONFIG_STACK_SENTINEL=y
CONFIG_PRINTK=y
CONFIG_LOG=y
CONFIG_LOG_BUFFER_SIZE=4096

# Keep stacks small to leave RAM for WAMR heap
CONFIG_MAIN_STACK_SIZE=2048

# UART for OTA wasm upload (shared with console)
CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_RING_BUFFER=y

# CRC-32 for upload validation
CONFIG_CRC=y
